<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>花语 · Emotion Field</title>
<style>
:root {
  --panel:   rgba(255,255,255,.72);
  --line:    rgba(35,35,35,.16);
  --text:    rgba(25,25,25,.85);
  --subtext: rgba(25,25,25,.45);
  --fill:    rgba(35,35,35,.48);
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }

body {
  width:100%; height:100vh; overflow:hidden;
  background:
    radial-gradient(900px 560px at 50% 18%, rgba(255,255,255,.85), transparent 75%),
    linear-gradient(180deg,#efefed 0%,#dfdfdc 100%);
  color:var(--text);
  font-family:"Avenir Next","Helvetica Neue",Helvetica,Arial,sans-serif;
  letter-spacing:.02em;
}

.scene { position:relative; width:100%; height:100%; }

#fieldCanvas {
  position:absolute; inset:0;
  width:100%; height:100%; display:block;
  filter:saturate(.72) contrast(.94);
}

#faceVideo { display:none; }

/* ── CENTER ── */
.center-info {
  position:absolute; left:50%; top:50%;
  transform:translate(-50%,-56%);
  text-align:center; pointer-events:none;
  width:min(500px,80vw); z-index:5;
}
.emotion {
  font-size:clamp(28px,4.4vw,56px);
  font-weight:600; text-transform:uppercase;
  letter-spacing:.12em; margin-bottom:12px;
  color:rgba(22,22,22,.8);
}
.meta {
  font-size:clamp(12px,1.4vw,15px);
  color:var(--subtext);
  display:flex; justify-content:center; gap:16px;
}
.control {
  margin-top:18px;
  display:inline-flex; align-items:center; gap:8px;
  padding:10px 16px;
  border:1px solid var(--line);
  background:var(--panel);
  backdrop-filter:blur(3px);
  border-radius:999px;
  pointer-events:auto;
}
button {
  border:1px solid var(--line);
  background:rgba(255,255,255,.6);
  color:var(--text);
  padding:7px 12px;
  border-radius:999px;
  font-size:11px; letter-spacing:.1em; text-transform:uppercase;
  cursor:pointer; transition:color .2s;
}
button:disabled { opacity:.4; cursor:not-allowed; }

/* ── SIDE PANELS ── */
.side-panel {
  position:absolute;
  width:min(22vw,268px); min-width:200px;
  border:1px solid var(--line);
  background:var(--panel);
  backdrop-filter:blur(3px);
  padding:10px; z-index:8;
}
.body-panel  { left:22px; top:22px; }
.voice-panel { right:22px; top:22px; }

.sp-head {
  font-size:11px; letter-spacing:.12em;
  text-transform:uppercase; color:var(--subtext);
  margin-bottom:8px;
}

/* ── POSE CAM ── */
.pose-cam {
  width:100%; aspect-ratio:4/3;
  border:1px solid var(--line);
  background:rgba(243,243,241,.9);
  overflow:hidden; margin-bottom:8px;
  position:relative;
}
.pose-cam canvas {
  position:absolute; inset:0;
  width:100%; height:100%; display:block;
}

/* ── WAVEFORM ── */
.wave-wrap {
  width:100%; height:62px;
  border:1px solid var(--line);
  background:rgba(243,243,241,.9);
  overflow:hidden; margin-bottom:8px;
}
.wave-wrap canvas { display:block; width:100%; height:100%; }

/* ── METRIC BARS ── */
.sp-metrics { display:flex; flex-direction:column; gap:5px; margin-bottom:8px; }
.metric {
  display:grid; grid-template-columns:78px 1fr 40px;
  align-items:center; gap:7px;
}
.m-label { font-size:9px; letter-spacing:.08em; color:var(--subtext); }
.m-track { height:1px; background:var(--line); }
.m-fill  { height:100%; background:var(--fill); width:0%; transition:width .3s ease; }
.m-val   { font-size:9px; color:var(--subtext); text-align:right; }

/* ── DIVIDER ── */
.sp-div { height:1px; background:var(--line); margin:6px 0; }

/* ── ML LOADER ── */
.ml-loader {
  display:flex; align-items:center; gap:8px;
  overflow:hidden; max-height:22px; opacity:1;
  transition:opacity .5s,max-height .5s;
  margin-bottom:6px;
}
.ml-loader.hidden { opacity:0; max-height:0; pointer-events:none; }
.ml-lbl   { font-size:8px; letter-spacing:.18em; color:var(--subtext); text-transform:uppercase; white-space:nowrap; flex-shrink:0; }
.ml-track { flex:1; height:1px; background:var(--line); }
.ml-fill  { height:100%; background:var(--fill); width:0%; transition:width .4s; }
.ml-pct   { font-size:8px; color:var(--subtext); white-space:nowrap; }

/* ── PANEL EMOTION DISPLAY ── */
.panel-emo { text-align:center; padding:6px 0 2px; }
.pe-en {
  font-size:clamp(16px,1.8vw,28px);
  font-weight:600; letter-spacing:.15em; text-transform:uppercase;
  color:var(--subtext);
  transition:color .6s,opacity .25s;
}
.pe-en.fade { opacity:.1; }
.pe-cn { font-size:10px; letter-spacing:.3em; color:var(--subtext); margin-top:2px; transition:color .6s; }

/* ── WEBCAM PANEL ── */
.webcam-panel {
  position:absolute; right:22px; bottom:22px;
  width:min(24vw,280px); min-width:180px;
  border:1px solid var(--line);
  background:var(--panel);
  backdrop-filter:blur(3px);
  padding:10px; z-index:8;
}
.webcam-head {
  font-size:11px; letter-spacing:.12em;
  text-transform:uppercase; color:var(--subtext);
  margin-bottom:8px;
}
#webcam-container {
  width:100%; aspect-ratio:1/1;
  border:1px solid var(--line);
  background:rgba(243,243,241,.9);
  overflow:hidden;
}
#webcam-container canvas { width:100%; height:100%; display:block; }
.label-strip {
  margin-top:8px; max-height:120px; overflow:auto;
  font-size:11px; color:var(--subtext);
  border-top:1px solid var(--line); padding-top:6px;
}
.label-item { display:flex; justify-content:space-between; padding:3px 0; }
.label-item.top { color:var(--text); font-weight:600; }
</style>
</head>
<body>
<div class="scene">
  <canvas id="fieldCanvas"></canvas>
  <video id="faceVideo" autoplay muted playsinline></video>

  <!-- LEFT: Body Posture + LMA -->
  <div class="side-panel body-panel">
    <div class="sp-head">Body · LMA</div>
    <div class="pose-cam">
      <canvas id="pose-canvas"></canvas>
    </div>
    <div class="sp-metrics">
      <div class="metric">
        <div class="m-label">Openness</div>
        <div class="m-track"><div class="m-fill" id="b-openness"></div></div>
        <div class="m-val" id="v-openness">—</div>
      </div>
      <div class="metric">
        <div class="m-label">Weight</div>
        <div class="m-track"><div class="m-fill" id="b-weight"></div></div>
        <div class="m-val" id="v-weight">—</div>
      </div>
      <div class="metric">
        <div class="m-label">Asymmetry</div>
        <div class="m-track"><div class="m-fill" id="b-asym"></div></div>
        <div class="m-val" id="v-asym">—</div>
      </div>
      <div class="metric">
        <div class="m-label">Flow</div>
        <div class="m-track"><div class="m-fill" id="b-flow"></div></div>
        <div class="m-val" id="v-flow">—</div>
      </div>
    </div>
    <div class="sp-div"></div>
    <div class="panel-emo">
      <div class="pe-en" id="body-en">—</div>
      <div class="pe-cn" id="body-cn">Body State</div>
    </div>
  </div>

  <!-- CENTER: Face emotion + controls -->
  <div class="center-info">
    <div class="emotion" id="emotionName">---</div>
    <div class="meta"><div id="emotionConfidence">Press start</div></div>
    <div class="control">
      <button id="startBtn" onclick="startAll()">▷ Start</button>
      <button id="micBtn"   onclick="startMic()">♪ Mic</button>
      <button id="ard1Btn"  onclick="connectSerial1()">⬡ Ard①</button>
      <button id="ard2Btn"  onclick="connectSerial2()">⬡ Ard②</button>
    </div>
  </div>

  <!-- RIGHT: Voice + ML Emotion -->
  <div class="side-panel voice-panel">
    <div class="sp-head">Voice · ML</div>
    <div class="wave-wrap">
      <canvas id="wave-canvas"></canvas>
    </div>
    <div class="sp-metrics">
      <div class="metric">
        <div class="m-label">Intensity</div>
        <div class="m-track"><div class="m-fill" id="b-intensity"></div></div>
        <div class="m-val" id="v-intensity">—</div>
      </div>
      <div class="metric">
        <div class="m-label">Pitch · YIN</div>
        <div class="m-track"><div class="m-fill" id="b-pitch"></div></div>
        <div class="m-val" id="v-pitch">—</div>
      </div>
      <div class="metric">
        <div class="m-label">Rhythm · ZCR</div>
        <div class="m-track"><div class="m-fill" id="b-rhythm"></div></div>
        <div class="m-val" id="v-rhythm">—</div>
      </div>
    </div>
    <div class="sp-div"></div>
    <div class="ml-loader hidden" id="ml-loader">
      <span class="ml-lbl">Model</span>
      <div class="ml-track"><div class="ml-fill" id="ml-fill"></div></div>
      <span class="ml-pct" id="ml-pct">0%</span>
    </div>
    <div class="panel-emo">
      <div class="pe-en" id="voice-en">—</div>
      <div class="pe-cn" id="voice-cn">Voice Emotion</div>
    </div>
  </div>

  <!-- BOTTOM-RIGHT: Face webcam -->
  <div class="webcam-panel">
    <div class="webcam-head">Portrait Feed</div>
    <div id="webcam-container">
      <canvas id="webcamDisplay"></canvas>
    </div>
    <div class="label-strip" id="label-container"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/face-api.js/dist/face-api.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/pitchfinder/dist/pitchfinder.js" crossorigin="anonymous"></script>

<script>
'use strict';

/* ══════════════════════════════════════════
   CONSTANTS
══════════════════════════════════════════ */
const MODEL_URL       = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights';
const DETECT_INTERVAL = 120;
const FLY_DURATION_MS = 3200;
const MAX_SETTLED     = 1400;

const EMOTION_TO_CMD = {
  happy:'2', surprised:'3', neutral:'1',
  fearful:'1', sad:'0', angry:'0', disgusted:'0',
};
const EMOTION_PALETTES = {
  happy:     ['#b5c38f','#d2c89f','#c0b89a','#b3bfa8','#d0b8a3'],
  angry:     ['#b58e8d','#b8a19d','#9e8380','#b39b92','#a98079'],
  sad:       ['#7f8ea6','#8b95ab','#6f829a','#8fa0b6','#76879f'],
  disgusted: ['#95a38a','#a6af95','#8d9a7c','#9ba88c','#8d9a83'],
  fearful:   ['#9b90aa','#a79db6','#8e86a2','#b1a5c0','#9589a8'],
  neutral:   ['#b7b8b2','#c0bfb6','#aeb1ad','#c7c6be','#b5b6af'],
  surprised: ['#94a9ad','#a6b8bb','#8ba1a6','#aebfc2','#95acb1'],
};

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
// face
let isRunning = false, inferInFlight = false, lastDetectAt = 0;

// pose
let poseInst, poseSending = false, prevLM = null;
const SMOOTH = 15, FLOW_WIN = 20, DEAD_ZONE = 0.02;
const lmaHistory  = { openness:[], weight:[], asym:[], flow:[] };
const lmaDisplayed = { openness:0, weight:0, asym:0, flow:0 };
let lmaOut = { O:0, W:0, A:0, F:0 };

// body state debounce
let curBodyKey = null, pendBodyKey = null, bodyTimer = null;

// voice
let audioCtx, analyser, yinDetector = null;
let rawAudio = new Float32Array(0);
let voiceSmooth = { intensity:0, pitch:0, rhythm:0 };
let mlPipeline = null, mlBusy = false;
let voiceEmoIndex = 0; // 0=neutral,1=happy,2=sad,3=angry

// serial
let serialWriter1 = null, lastFaceCmd = null, lastFaceSendAt = 0;
let serialWriter2 = null;

/* ══════════════════════════════════════════
   DOM
══════════════════════════════════════════ */
const emotionName  = document.getElementById('emotionName');
const emotionConf  = document.getElementById('emotionConfidence');
const labelCont    = document.getElementById('label-container');
const video        = document.getElementById('faceVideo');
const webcamDisp   = document.getElementById('webcamDisplay');
const poseCanvas   = document.getElementById('pose-canvas');
const poseCtx      = poseCanvas.getContext('2d');
const waveCanvas   = document.getElementById('wave-canvas');
const waveCtx      = waveCanvas.getContext('2d');
const startBtn     = document.getElementById('startBtn');
const micBtn       = document.getElementById('micBtn');
const ard1Btn      = document.getElementById('ard1Btn');
const ard2Btn      = document.getElementById('ard2Btn');

/* ══════════════════════════════════════════
   UTILITIES
══════════════════════════════════════════ */
const clamp = (v,lo,hi) => Math.max(lo, Math.min(hi, v));
const lerp  = (a,b,t)   => a + (b-a)*t;

function setBar(id, v) { document.getElementById('b-'+id).style.width = clamp(v,0,1)*100+'%'; }
function setVal(id, t) { document.getElementById('v-'+id).textContent = t; }
function pct(v)        { return Math.round(v*100).toString(); }

function applyPanelEmo(enId, cnId, enText, cnText, col) {
  const en = document.getElementById(enId);
  const cn = document.getElementById(cnId);
  en.classList.add('fade');
  setTimeout(() => {
    en.textContent = enText; cn.textContent = cnText;
    en.style.color = col;    cn.style.color = col;
    en.classList.remove('fade');
  }, 260);
}

function withTimeout(promise, ms, msg) {
  return Promise.race([promise, new Promise((_,r) => setTimeout(() => r(new Error(msg)), ms))]);
}

/* ══════════════════════════════════════════
   FIELD CANVAS + FLOWERS
══════════════════════════════════════════ */
const fieldCanvas = document.getElementById('fieldCanvas');
const ctx         = fieldCanvas.getContext('2d');
let w=0, h=0, cx=0, cy=0, horizonY=0;
const flyingFlowers = [], settledFlowers = [];

function resizeCanvas() {
  w = window.innerWidth; h = window.innerHeight;
  cx = w*.5; cy = h*.52; horizonY = h*.28;
  fieldCanvas.width = w; fieldCanvas.height = h;
}

function pickPaletteColor(emotion) {
  const p = EMOTION_PALETTES[emotion] || EMOTION_PALETTES.neutral;
  return p[Math.floor(Math.random() * p.length)];
}

function spawnFlowerBurst(emotion, confidence) {
  const amount = Math.round(8 + confidence * 14);
  const now    = performance.now();
  const spread = Math.max(220, w * .22);
  for (let i = 0; i < amount; i++) {
    flyingFlowers.push({
      startX:    cx + (Math.random()-.5)*28,
      startY:    cy + (Math.random()-.5)*22,
      targetX:   cx + (Math.random()-.5)*spread*(1.15+Math.random()*2.4),
      targetY:   horizonY + Math.random()*(h*.34),
      size:      8 + Math.random()*16,
      rotation:  Math.random()*Math.PI*2,
      color:     pickPaletteColor(emotion),
      createdAt: now + i*24,
      duration:  FLY_DURATION_MS + Math.random()*900,
      stem:      12 + Math.random()*26,
    });
  }
}

function drawSoftFlower(x, y, size, rotation, color, alpha, stemLength) {
  ctx.save(); ctx.translate(x,y); ctx.rotate(rotation); ctx.globalAlpha = alpha;
  if (stemLength > 0) {
    ctx.strokeStyle = 'rgba(90,100,86,.24)'; ctx.lineWidth = .8;
    ctx.beginPath(); ctx.moveTo(0,6); ctx.lineTo(0,stemLength); ctx.stroke();
  }
  for (let p = 0; p < 5; p++) {
    ctx.save(); ctx.rotate(Math.PI*2*p/5); ctx.scale(1,1.15);
    ctx.beginPath();
    ctx.ellipse(0,-size*.55,size*.28,size*.68,.24,0,Math.PI*2);
    ctx.fillStyle = color; ctx.fill(); ctx.restore();
  }
  ctx.beginPath(); ctx.arc(0,0,size*.14,0,Math.PI*2);
  ctx.fillStyle = 'rgba(122,106,72,.55)'; ctx.fill();
  ctx.restore();
}

function renderFieldFrame(now) {
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = 'rgba(248,248,246,.65)'; ctx.fillRect(0,0,w,horizonY+20);
  ctx.fillStyle = 'rgba(217,216,209,.35)'; ctx.fillRect(0,horizonY,w,h-horizonY);

  for (let i = flyingFlowers.length-1; i >= 0; i--) {
    const f = flyingFlowers[i];
    const t = (now - f.createdAt) / f.duration;
    if (t <= 0) continue;
    if (t >= 1) {
      settledFlowers.push({ x:f.targetX, y:f.targetY, size:f.size*.72, rotation:f.rotation, color:f.color, stem:f.stem });
      flyingFlowers.splice(i, 1);
      if (settledFlowers.length > MAX_SETTLED) settledFlowers.shift();
      continue;
    }
    const eased = 1 - Math.pow(1-t, 3);
    const fx    = f.startX + (f.targetX-f.startX)*eased;
    const fy    = f.startY + (f.targetY-f.startY)*eased - Math.sin(eased*Math.PI)*36;
    drawSoftFlower(fx, fy, f.size*(1-eased*.55), f.rotation+eased*1.4, f.color, .7-eased*.2, f.stem*(1-eased*.6));
  }

  for (let i = 0; i < settledFlowers.length; i++) {
    const sf    = settledFlowers[i];
    const depth = (sf.y - horizonY) / Math.max(1, h - horizonY);
    const scale = .24 + depth*1.06;
    drawSoftFlower(sf.x, sf.y, sf.size*scale, sf.rotation, sf.color, .25+depth*.56, sf.stem*scale);
  }
  requestAnimationFrame(renderFieldFrame);
}

/* ══════════════════════════════════════════
   MODULE 1 — FACE
══════════════════════════════════════════ */
function updateLabelStrip(sorted) {
  labelCont.innerHTML = '';
  for (const [emo, prob] of sorted) {
    const row = document.createElement('div');
    row.className = 'label-item' + (emo === sorted[0][0] ? ' top' : '');
    row.innerHTML = `<span>${emo}</span><span>${(prob*100).toFixed(1)}%</span>`;
    labelCont.appendChild(row);
  }
}

function drawWebcamFrame() {
  if (!video || video.readyState < 2) return;
  const vw = video.videoWidth, vh = video.videoHeight;
  if (!vw || !vh) return;
  const size = Math.min(vw, vh);
  const sx = (vw-size)/2, sy = (vh-size)/2;
  const dc = webcamDisp.getContext('2d');
  dc.save(); dc.translate(220,0); dc.scale(-1,1);
  dc.drawImage(video, sx,sy,size,size, 0,0,220,220);
  dc.restore();
}

async function detectLoop() {
  if (!isRunning) return;
  drawWebcamFrame();
  const now = performance.now();
  if (!inferInFlight && now - lastDetectAt >= DETECT_INTERVAL) {
    inferInFlight = true; lastDetectAt = now;
    try {
      const result = await faceapi
        .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
        .withFaceExpressions();
      if (result) {
        const sorted = Object.entries(result.expressions).sort((a,b) => b[1]-a[1]);
        const [topEmo, topConf] = sorted[0];
        updateLabelStrip(sorted);
        if (topConf > 0.4) {
          emotionName.textContent = topEmo.toUpperCase();
          emotionConf.textContent = `${(topConf*100).toFixed(1)}% confidence`;
          spawnFlowerBurst(topEmo, topConf);
          sendFaceCmd(EMOTION_TO_CMD[topEmo] || '1');
        }
      } else {
        emotionName.textContent = '---';
        emotionConf.textContent = 'No face detected';
      }
    } catch(e) { console.error('Face detection:', e); }
    inferInFlight = false;
  }
  requestAnimationFrame(detectLoop);
}

async function startAll() {
  try {
    startBtn.disabled = true;
    emotionName.textContent = 'Loading';
    emotionConf.textContent = 'Downloading models…';
    await withTimeout(
      Promise.all([
        faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
        faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL),
      ]),
      30000, 'Model loading timeout'
    );
    emotionConf.textContent = 'Starting camera…';
    const stream = await navigator.mediaDevices.getUserMedia({ video:true, audio:false });
    video.srcObject = stream;
    await new Promise(r => { video.onloadedmetadata = r; });
    await video.play();
    await new Promise(r => { video.onplaying = r; setTimeout(r, 500); });
    webcamDisp.width = 220; webcamDisp.height = 220;
    isRunning = true;
    emotionName.textContent = '---';
    emotionConf.textContent = 'Ready';
    requestAnimationFrame(detectLoop);
    setupPose().catch(e => console.error('Pose setup failed:', e));
  } catch(e) {
    console.error(e);
    emotionName.textContent = 'ERROR';
    emotionConf.textContent = e.message || 'Init failed';
    startBtn.disabled = false;
  }
}

/* ══════════════════════════════════════════
   MODULE 2 — POSE (MediaPipe + LMA)
══════════════════════════════════════════ */
async function setupPose() {
  poseInst = new Pose({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
  });
  poseInst.setOptions({
    modelComplexity:1, smoothLandmarks:true, enableSegmentation:false,
    minDetectionConfidence:.5, minTrackingConfidence:.5,
  });
  poseInst.onResults(onPoseResults);
  poseRAF();
}

function poseRAF() {
  requestAnimationFrame(async () => {
    if (video.readyState >= 2 && !poseSending) {
      poseSending = true;
      try { await poseInst.send({ image: video }); } catch(_) {}
      poseSending = false;
    }
    poseRAF();
  });
}

function onPoseResults(res) {
  const W = res.image.width, H = res.image.height;
  if (poseCanvas.width  !== W) poseCanvas.width  = W;
  if (poseCanvas.height !== H) poseCanvas.height = H;
  poseCtx.save();
  poseCtx.clearRect(0,0,W,H);
  poseCtx.drawImage(res.image, 0,0,W,H);
  if (res.poseLandmarks) {
    const L = res.poseLandmarks;
    drawConnectors(poseCtx, L, POSE_CONNECTIONS, { color:'rgba(35,35,35,.28)', lineWidth:1.2 });
    drawLandmarks(poseCtx, L, { color:'rgba(35,35,35,.55)', fillColor:'rgba(255,255,255,.5)', lineWidth:.8, radius:2.5 });
    calcLMA(L);
  }
  poseCtx.restore();
}

function slidingAvg(key, val) {
  const h = lmaHistory[key]; h.push(val);
  if (h.length > SMOOTH) h.shift();
  return h.reduce((a,b) => a+b, 0) / h.length;
}
function flowMedian(val) {
  const h = lmaHistory.flow; h.push(val);
  if (h.length > FLOW_WIN) h.shift();
  const s = h.slice().sort((a,b) => a-b), m = Math.floor(s.length/2);
  return s.length%2===0 ? (s[m-1]+s[m])/2 : s[m];
}
function deadZone(key, val) {
  if (Math.abs(val - lmaDisplayed[key]) < DEAD_ZONE) return lmaDisplayed[key];
  lmaDisplayed[key] = val; return val;
}
function vis(L, i) { return L[i] && L[i].visibility > 0.5; }

function calcLMA(L) {
  let openness=0, weight=0, asym=0, flow=0;

  if (vis(L,11)&&vis(L,12)&&vis(L,15)&&vis(L,16)) {
    const sw = Math.abs(L[11].x-L[12].x), ww = Math.abs(L[15].x-L[16].x);
    openness = sw > 0.02 ? clamp(ww/sw/2.2, 0,1) : 0;
  }
  if (vis(L,0)&&vis(L,11)&&vis(L,12)&&vis(L,23)&&vis(L,24)) {
    const sy = (L[11].y+L[12].y)/2, hy = (L[23].y+L[24].y)/2;
    weight = clamp(((L[0].y-sy)/Math.max(hy-sy,0.06)+0.5)/1.2, 0,1);
  }
  if (vis(L,11)&&vis(L,12)) {
    asym = clamp(Math.abs(L[11].y-L[12].y)/0.09, 0,1);
  }
  if (prevLM) {
    let d=0, n=0;
    [0,11,12,13,14,15,16,23,24].forEach(i => {
      if (L[i]&&prevLM[i]&&L[i].visibility>0.3) {
        const dx=L[i].x-prevLM[i].x, dy=L[i].y-prevLM[i].y;
        d += Math.sqrt(dx*dx+dy*dy); n++;
      }
    });
    if (n > 0) flow = clamp((d/n)/0.014, 0,1);
  }
  prevLM = L.map(lm => ({ x:lm.x, y:lm.y, visibility:lm.visibility }));

  const sO = deadZone('openness', slidingAvg('openness', openness));
  const sW = deadZone('weight',   slidingAvg('weight',   weight));
  const sA = deadZone('asym',     slidingAvg('asym',     asym));
  const sF = deadZone('flow',     flowMedian(flow));

  setBar('openness', sO); setVal('openness', pct(sO));
  setBar('weight',   sW); setVal('weight',   pct(sW));
  setBar('asym',     sA); setVal('asym',     pct(sA));
  setBar('flow',     sF); setVal('flow',     pct(sF));

  lmaOut = { O:sO, W:sW, A:sA, F:sF };
  updateBodyState(sO, sW, sA, sF);
}

const BODY_STATES = {
  open:       { en:'OPEN',        cn:'开放', col:'#6a9a5a' },
  heavy:      { en:'HEAVY',       cn:'沉重', col:'#5a587a' },
  active:     { en:'ACTIVE',      cn:'激活', col:'#a88840' },
  contracted: { en:'CONTRACTED',  cn:'收缩', col:'#4a6888' },
  unbalanced: { en:'UNBALANCED',  cn:'失衡', col:'#9a6a44' },
  neutral:    { en:'NEUTRAL',     cn:'中性', col:'#888888' },
};

function classifyBodyState(O, W, As, F) {
  if (O>0.55 && W<0.42 && F>0.22) return 'open';
  if (W>0.65  && O<0.42)          return 'heavy';
  if (As>0.55)                     return 'unbalanced';
  if (F>0.62)                      return 'active';
  if (O<0.28  && F<0.28)          return 'contracted';
  return 'neutral';
}

function updateBodyState(O, W, As, F) {
  const k = classifyBodyState(O, W, As, F);
  if (k === curBodyKey || k === pendBodyKey) return;
  pendBodyKey = k;
  clearTimeout(bodyTimer);
  bodyTimer = setTimeout(() => {
    curBodyKey = pendBodyKey;
    const s = BODY_STATES[curBodyKey];
    applyPanelEmo('body-en', 'body-cn', s.en, s.cn, s.col);
  }, 1800);
}

/* ══════════════════════════════════════════
   MODULE 3 — VOICE (Web Audio + ML)
══════════════════════════════════════════ */
async function startMic() {
  micBtn.disabled = true;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio:true, video:false });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const src = audioCtx.createMediaStreamSource(stream);

    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048; analyser.smoothingTimeConstant = .25;
    src.connect(analyser);

    if (typeof pitchfinder !== 'undefined' && pitchfinder.YIN) {
      try { yinDetector = pitchfinder.YIN({ sampleRate: audioCtx.sampleRate }); } catch(_) {}
    }

    const collector = audioCtx.createScriptProcessor(4096,1,1);
    const silencer  = audioCtx.createGain(); silencer.gain.value = 0;
    src.connect(collector); collector.connect(silencer); silencer.connect(audioCtx.destination);
    collector.onaudioprocess = collectAudio;

    resizeWave();
    runAnalysis();
    startML();
  } catch(e) {
    console.error('Mic failed:', e);
    micBtn.disabled = false;
  }
}

function runAnalysis() {
  const N    = analyser.fftSize;
  const fBuf = new Float32Array(N);
  const bBuf = new Uint8Array(analyser.frequencyBinCount);
  let tick = 0;
  (function loop() {
    requestAnimationFrame(loop);
    analyser.getByteTimeDomainData(bBuf);
    drawWave(bBuf);
    if (++tick % 3 !== 0) return;
    analyser.getFloatTimeDomainData(fBuf);

    let sum = 0;
    for (let i=0; i<N; i++) sum += fBuf[i]*fBuf[i];
    const rms  = Math.sqrt(sum/N);
    const intn = clamp(rms/.38, 0,1);

    let hz = -1;
    if (rms > 0.007)
      hz = yinDetector ? (yinDetector(fBuf)||-1) : yinFallback(fBuf, audioCtx.sampleRate);
    let pitchN = 0;
    if (hz > 65 && hz < 420) pitchN = clamp((hz-80)/(300-80), 0,1);

    let zc = 0;
    for (let i=1; i<N; i++) if ((fBuf[i]>=0) !== (fBuf[i-1]>=0)) zc++;
    const rhythm = clamp((zc/N)/.11, 0,1);

    const A = .3;
    voiceSmooth.intensity = lerp(voiceSmooth.intensity, intn,   A);
    voiceSmooth.pitch     = lerp(voiceSmooth.pitch,     pitchN, A);
    voiceSmooth.rhythm    = lerp(voiceSmooth.rhythm,    rhythm, A);

    setBar('intensity', voiceSmooth.intensity); setVal('intensity', pct(voiceSmooth.intensity));
    setBar('pitch',     voiceSmooth.pitch);     setVal('pitch',     hz>0 ? Math.round(hz)+' Hz' : '—');
    setBar('rhythm',    voiceSmooth.rhythm);    setVal('rhythm',    pct(voiceSmooth.rhythm));
  })();
}

function drawWave(data) {
  const W = waveCanvas.width, H = waveCanvas.height;
  waveCtx.clearRect(0,0,W,H);
  waveCtx.strokeStyle = 'rgba(35,35,35,.08)'; waveCtx.lineWidth = 1;
  waveCtx.beginPath(); waveCtx.moveTo(0,H/2); waveCtx.lineTo(W,H/2); waveCtx.stroke();
  waveCtx.strokeStyle = 'rgba(35,35,35,.42)'; waveCtx.lineWidth = 1.2;
  waveCtx.beginPath();
  const sw = W / data.length;
  for (let i=0; i<data.length; i++) {
    const y = (data[i]/128) * H/2;
    i===0 ? waveCtx.moveTo(0,y) : waveCtx.lineTo(i*sw, y);
  }
  waveCtx.stroke();
}

function resizeWave() {
  waveCanvas.width  = waveCanvas.parentElement.clientWidth;
  waveCanvas.height = waveCanvas.parentElement.clientHeight;
}
window.addEventListener('resize', resizeWave);
resizeWave();

function yinFallback(buf, sr) {
  const minT = Math.floor(sr/420), maxT = Math.ceil(sr/65);
  const N = Math.min((buf.length/2)|0, maxT+60);
  if (N < minT+4) return -1;
  const d = new Float32Array(N); d[0]=1; let run=0;
  for (let t=1; t<N; t++) {
    let s=0; const lim=Math.min(N,buf.length-t);
    for (let j=0; j<lim; j++) { const x=buf[j]-buf[j+t]; s+=x*x; }
    run+=s; d[t]=run>0?(s*t)/run:1;
  }
  for (let t=minT; t<Math.min(maxT,N-2); t++) {
    if (d[t]<0.13) {
      while (t+1<N && d[t+1]<d[t]) t++;
      const a=d[t-1], b=d[t], g=d[t+1], den=2*(2*b-a-g);
      return sr / (den!==0 ? t-(g-a)/den : t);
    }
  }
  let mv=Infinity, mi=-1;
  for (let t=minT; t<Math.min(maxT,N); t++) if (d[t]<mv) { mv=d[t]; mi=t; }
  return (mv<0.28 && mi>0) ? sr/mi : -1;
}

function collectAudio(e) {
  const chunk  = new Float32Array(e.inputBuffer.getChannelData(0));
  const maxLen = Math.floor(audioCtx.sampleRate * 5);
  const joined = new Float32Array(rawAudio.length + chunk.length);
  joined.set(rawAudio); joined.set(chunk, rawAudio.length);
  rawAudio = joined.length > maxLen ? joined.slice(-maxLen) : joined;
}

async function resampleTo16k(input, fromSR) {
  if (fromSR === 16000) return input;
  const outLen = Math.round(input.length * 16000 / fromSR);
  const off    = new OfflineAudioContext(1, outLen, 16000);
  const ab     = off.createBuffer(1, input.length, fromSR);
  ab.copyToChannel(input, 0);
  const src = off.createBufferSource();
  src.buffer = ab; src.connect(off.destination); src.start(0);
  const rendered = await off.startRendering();
  return rendered.getChannelData(0);
}

const VOICE_EMO = {
  angry:   { en:'ANGRY',   cn:'愤怒', col:'#9a4848', idx:3 },
  happy:   { en:'HAPPY',   cn:'开心', col:'#7a9048', idx:1 },
  neutral: { en:'NEUTRAL', cn:'平静', col:'#5a8a6a', idx:0 },
  sad:     { en:'SAD',     cn:'悲伤', col:'#4a6898', idx:2 },
};
function labelToKey(label) {
  const l = label.toLowerCase();
  if (l.includes('ang')) return 'angry';
  if (l.includes('hap')) return 'happy';
  if (l.includes('sad')) return 'sad';
  return 'neutral';
}

async function startML() {
  const loader = document.getElementById('ml-loader');
  const fillEl = document.getElementById('ml-fill');
  const pctEl  = document.getElementById('ml-pct');
  loader.classList.remove('hidden');
  document.getElementById('voice-cn').textContent = '模型加载中…';
  try {
    const { pipeline, env } = await import(
      'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1/dist/transformers.min.js'
    );
    env.backends.onnx.wasm.numThreads = 1;
    mlPipeline = await pipeline(
      'audio-classification', 'Xenova/wav2vec2-base-superb-er',
      {
        progress_callback(p) {
          if (p.progress != null) {
            const v = Math.round(p.progress);
            fillEl.style.width = v+'%'; pctEl.textContent = v+'%';
          }
          if (p.status === 'ready') {
            loader.classList.add('hidden');
            document.getElementById('voice-cn').textContent = 'Ready';
            runMLLoop();
          }
        }
      }
    );
  } catch(err) {
    pctEl.textContent = 'ERR'; console.error('ML load:', err);
  }
}

function runMLLoop() {
  setInterval(async () => {
    if (mlBusy || !mlPipeline) return;
    if (rawAudio.length < audioCtx.sampleRate * 1.5) return;
    mlBusy = true;
    try {
      const chunkLen = Math.min(rawAudio.length, Math.floor(audioCtx.sampleRate * 3));
      const r16k     = await resampleTo16k(rawAudio.slice(-chunkLen), audioCtx.sampleRate);
      const result   = await mlPipeline(r16k, { sampling_rate:16000, topk:4 });
      if (result && result.length > 0) {
        const info = VOICE_EMO[labelToKey(result[0].label)];
        voiceEmoIndex = info.idx;
        applyPanelEmo('voice-en', 'voice-cn', info.en, info.cn, info.col);
      }
    } catch(e) { console.warn('Inference:', e); }
    finally { mlBusy = false; }
  }, 3000);
}

async function connectSerial1() {
  if (!navigator.serial) { alert('Web Serial not supported. Use Chrome/Edge.'); return; }
  try {
    ard1Btn.disabled = true;
    const port = await navigator.serial.requestPort();
    await port.open({ baudRate:9600 });
    const enc = new TextEncoderStream();
    enc.readable.pipeTo(port.writable);
    serialWriter1 = enc.writable.getWriter();
    await new Promise(r => setTimeout(r, 2000));
    ard1Btn.textContent = '⬡ Ard① ✓';
    ard1Btn.style.color = 'rgba(50,110,50,.9)';
  } catch(e) {
    console.error('Serial1:', e);
    ard1Btn.disabled = false;
  }
}

async function connectSerial2() {
  if (!navigator.serial) { alert('Web Serial not supported. Use Chrome/Edge.'); return; }
  try {
    ard2Btn.disabled = true;
    const port = await navigator.serial.requestPort();
    await port.open({ baudRate:9600 });
    const enc = new TextEncoderStream();
    enc.readable.pipeTo(port.writable);
    serialWriter2 = enc.writable.getWriter();
    await new Promise(r => setTimeout(r, 2000));
    ard2Btn.textContent = '⬡ Ard② ✓';
    ard2Btn.style.color = 'rgba(50,110,50,.9)';
  } catch(e) {
    console.error('Serial2:', e);
    ard2Btn.disabled = false;
  }
}

function sendFaceCmd(cmd) {
  const now = Date.now();
  if (cmd === lastFaceCmd || now - lastFaceSendAt < 700 || !serialWriter1) return;
  serialWriter1.write(cmd).catch(() => {});
  lastFaceCmd = cmd; lastFaceSendAt = now;
}

// Send pose+voice to Arduino #2 every 500ms
setInterval(() => {
  if (!serialWriter2) return;
  const { O, W, A, F } = lmaOut;
  serialWriter2.write(
    `${Math.round(O*99)},${Math.round(W*99)},${Math.round(A*99)},${Math.round(F*99)},${voiceEmoIndex}\n`
  ).catch(() => {});
}, 500);
